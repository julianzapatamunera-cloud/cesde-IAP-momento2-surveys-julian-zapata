<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <style>
        body
        {
            margin: 20px;
            border-radius: 20px;
            min-height: auto;
            background: linear-gradient(#FFFACD, #FFFFE0);
            color: #1f2933;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }
        fieldset
        {
            border-radius: 15px;
            border-color: #DAA520;
            border:solid 4px #DAA520;
        }
        h2
        {
            font-size:xx-large;
            text-align: center;
            color: black;
        }
        footer
        {
            
            display:block;
            margin-top: 20px;
            padding: 10px;
            background-color: #DAA520;
            border-radius: 15px;
            align-items: center;
            text-align: center;
        }
        .fonttype{
            font-family: cursive, sans-serif;
        }
        option{
            font-family: cursive;
        }
        input{
            border-radius: 5px;
            border-color: #FAFAD2;
        }
        
    </style>
</head>
<body>
    <fieldset>
        <legend><h2 class="fonttype">Formulario de contacto</h2></legend>
            <form>
                <label for="nombre" class="fonttype">Nombre:</label>
                <br>
                <input type="text" id="nombre" name="nombre" required placeholder="Pepito Perez" min="6" max="20">

                <p></p>

                <label for="email" class="fonttype">Correo electrónico:</label>
                <br>
                <input type="email" id="email" name="email" required placeholder="ejemplo@cesde.net">

                <p class="fonttype">Tipo de usuario:</p>
                <label for="estudiante" class="fonttype">Estudiante</label>
                <input type="radio" id="estudiante" name="tipo" value="estudiante">
                
                <label for="desarrollador" class="fonttype">Profesor</label>
                <input type="radio" id="desarrollador" name="tipo" value="desarrollador">                  
                
                <label for="otro" class="fonttype">Otro</label>
                <input type="radio" id="otro" name="tipo" value="otro">

                <p class="fonttype">Temas de interés:</p>
                <label class="fonttype">Inteligencia Artificial</label>
                <input type="checkbox" name="intereses" value="ia">
                    
                <label class="fonttype">Desarrollo Web </label>
                <input type="checkbox" name="intereses" value="web">

                <label class="fonttype">Front End</label>
                <input type="checkbox" name="intereses" value="Front End">

                <label class="fonttype">Backend</label>
                <input type="checkbox" name="intereses" value="backend">

                <p></p>

                <label for="lenguaje" class="fonttype">Lenguaje favorito de desarrollo:</label>
                <select id="lenguaje" name="lenguaje">
                    <option value="java">Java</option>
                    <option value="python">Python</option>
                    <option value="js">JavaScript</option>
                    <option value="otro">Otro</option>
                </select>
                <p class="fonttype">Por favor dejanos tus comentarios:</p>
                <label for="mensaje"></label>
                <textarea id="mensaje" name="mensaje" rows="4" style="border-radius: 5px; border-color: #DAA520;"></textarea>
                <br>
                <button type="submit" style="border-radius: 5px; border-color: #DAA520; background-color: #FAFAD2;">Enviar</button>
            </form>
    </fieldset>
<footer>
    <p>“Proyecto académico sin frameworks - 2026 Momento 2”</p>
</footer>
</body>
</html>
